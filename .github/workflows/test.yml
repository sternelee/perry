name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  # ---------------------------------------------------------------------------
  # Build compiler + runtime once, cache for downstream jobs
  # ---------------------------------------------------------------------------
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release (runtime + stdlib + compiler)
        run: cargo build --release

      - name: Upload built binaries
        uses: actions/upload-artifact@v4
        with:
          name: perry-binaries
          path: |
            target/release/perry
            target/release/libperry_runtime.a
            target/release/libperry_stdlib.a
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Rust unit tests (266+ tests across all crates)
  # ---------------------------------------------------------------------------
  cargo-test:
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --workspace --exclude perry-ui-ios

  # ---------------------------------------------------------------------------
  # Parity tests (Perry output vs Node.js)
  # ---------------------------------------------------------------------------
  parity:
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build compiler
        run: cargo build --release

      - name: Run parity tests
        run: ./run_parity_tests.sh

      - name: Check parity threshold
        run: |
          REPORT="test-parity/reports/latest.json"
          THRESHOLD_FILE="test-parity/threshold.json"

          if [[ ! -f "$REPORT" ]]; then
            echo "No parity report found"
            exit 1
          fi

          ACTUAL=$(jq -r '.summary.parity_percentage' "$REPORT")
          MIN=$(jq -r '.min_parity_pct' "$THRESHOLD_FILE")

          echo "Parity: ${ACTUAL}% (threshold: ${MIN}%)"

          awk -v a="$ACTUAL" -v m="$MIN" 'BEGIN {
            if (a+0 < m+0) { print "FAIL: Parity " a "% is below threshold " m "%"; exit 1 }
            print "OK: Parity " a "% meets threshold " m "%"
          }'

      - name: Check for new failures
        run: |
          REPORT="test-parity/reports/latest.json"
          KNOWN="test-parity/known_failures.json"

          jq -r '(.failures.parity // []) + (.failures.compile // []) | .[]' "$REPORT" | sort -u > /tmp/all_fails.txt
          if [[ -f "$KNOWN" ]]; then
            jq -r 'keys[]' "$KNOWN" | sort -u > /tmp/known.txt
          else
            : > /tmp/known.txt
          fi

          TOTAL=$(wc -l < /tmp/all_fails.txt | tr -d ' ')
          comm -23 /tmp/all_fails.txt /tmp/known.txt > /tmp/new.txt
          if [[ -s /tmp/new.txt ]]; then
            echo "NEW FAILURES (not in known_failures.json):"
            sed 's/^/  - /' /tmp/new.txt
            exit 1
          fi
          echo "All ${TOTAL} failures are known/triaged."

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: test-parity/reports/latest.json

  # ---------------------------------------------------------------------------
  # Compile smoke test (all 130+ test files must compile)
  # ---------------------------------------------------------------------------
  compile-smoke:
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build compiler
        run: cargo build --release

      - name: Compile all test files
        run: |
          PERRY="target/release/perry"
          PASS=0
          FAIL=0
          FAILURES=()

          for f in test-files/*.ts; do
            [[ -d "$f" ]] && continue
            name=$(basename "$f" .ts)
            if $PERRY "$f" -o "/tmp/perry_smoke_${name}" 2>/dev/null; then
              ((PASS++))
              rm -f "/tmp/perry_smoke_${name}"
            else
              ((FAIL++))
              FAILURES+=("$name")
            fi
          done

          echo "Compile smoke: $PASS passed, $FAIL failed"

          if [[ $FAIL -gt 0 ]]; then
            echo "Compile failures:"
            for f in "${FAILURES[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Binary size tracking (main branch only)
  # ---------------------------------------------------------------------------
  binary-size:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: perry-binaries
          path: target/release/

      - name: Report binary sizes
        run: |
          echo "## Binary Sizes" > /tmp/sizes.md
          echo '```' >> /tmp/sizes.md
          ls -lh target/release/perry target/release/libperry_runtime.a target/release/libperry_stdlib.a 2>/dev/null | awk '{print $5, $9}' >> /tmp/sizes.md
          echo '```' >> /tmp/sizes.md
          cat /tmp/sizes.md

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: binary-sizes
          path: /tmp/sizes.md
